<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>確認コード｜となりっこ</title>
  <style>@media only screen and (max-width:620px){.email-card{padding:28px 20px!important;}.otp-code{font-size:32px!important;letter-spacing:0.35em!important;}}</style>
</head>
<body style="margin:0;padding:0;background-color:#F3F4F6;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;">確認コード {{ .Token }}。本人確認のためご入力ください。</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#F3F4F6;">
    <tr><td align="center" style="padding:32px 16px;">
      <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;width:100%;">
        <tr><td align="center" style="padding-bottom:24px;">
          <img src="{{ .SiteURL }}/logo.png" alt="となりっこ" width="80" height="80" style="display:block;width:80px;height:80px;border-radius:16px;margin:0 auto 8px;box-shadow:0 4px 14px rgba(37,99,235,0.22);" />
          <div style="font-size:20px;font-weight:700;color:#1F2937;">となりっこ</div>
          <div style="font-size:12px;color:#6B7280;margin-top:4px;">うちの子を覚える育児AI</div>
        </td></tr>
        <tr><td class="email-card" style="background:#FFF;border-radius:16px;border:1px solid #E5E7EB;padding:36px 32px;">
          <h1 style="margin:0 0 8px;font-size:18px;font-weight:700;color:#1F2937;text-align:center;">本人確認コード</h1>
          <p style="margin:0 0 24px;font-size:14px;color:#6B7280;text-align:center;line-height:1.7;">アカウントの安全のため、操作を続けるには<br />確認コードの入力が必要です。</p>
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr><td align="center" style="padding-bottom:24px;">
            <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:20px 24px;display:inline-block;">
              <p class="otp-code" style="margin:0;font-size:36px;font-weight:700;color:#1D4ED8;letter-spacing:0.45em;font-family:ui-monospace,monospace;">{{ .Token }}</p>
            </div>
          </td></tr></table>
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr><td align="center">
            <a href="{{ .SiteURL }}/login" target="_blank" style="display:inline-block;background-color:#3B82F6;color:#FFFFFF;font-size:14px;font-weight:600;text-decoration:none;padding:14px 32px;border-radius:12px;">ログイン画面を開く</a>
          </td></tr></table>
          <p style="margin:20px 0 0;font-size:12px;color:#9CA3AF;text-align:center;">⏱ 1時間有効（1回のみ使用可）· 心当たりがない場合は無視してください</p>
        </td></tr>
        <tr><td align="center" style="padding:28px 8px 0;">
          <p style="margin:0 0 4px;font-size:11px;color:#9CA3AF;">{{ .Email }} 宛 · <a href="{{ .SiteURL }}" style="color:#6B7280;">tonarikko.com</a></p>
          <p style="margin:0;font-size:11px;color:#9CA3AF;line-height:1.6;">医療行為・診断ではありません。お子さんの様子が心配なときは、かかりつけ医や専門家にご相談ください。</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
